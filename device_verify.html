<script>
    const state = {
        verifying: false
    };

    const inputs = document.querySelectorAll('.otp-input');
    const verifyBtn = document.getElementById('verifyBtn');
    const errMsg = document.getElementById('err');
    const successMsg = document.getElementById('successMsg');
    const spinner = document.getElementById('spinner');

    // =========================
    // OTP INPUT HANDLING
    // =========================
    inputs.forEach((input, index) => {

        input.addEventListener('input', (e) => {
            const val = e.target.value.replace(/\D/g, '');

            input.value = val;

            // Handle paste/autofill
            if (val.length > 1) {
                const chars = val.slice(0, 6).split('');

                chars.forEach((char, i) => {
                    if (inputs[index + i]) {
                        inputs[index + i].value = char;
                    }
                });

                checkAndAutoSubmit();
                return;
            }

            // Move forward
            if (val && index < inputs.length - 1) {
                inputs[index + 1].focus();
            }

            checkAndAutoSubmit();
        });

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && !input.value && index > 0) {
                inputs[index - 1].focus();
            }
        });

        input.addEventListener('paste', (e) => {
            e.preventDefault();

            const pasted = e.clipboardData
                .getData('text')
                .replace(/\D/g, '')
                .slice(0, 6)
                .split('');

            pasted.forEach((char, i) => {
                if (inputs[i]) {
                    inputs[i].value = char;
                }
            });

            checkAndAutoSubmit();
        });

    });

    // =========================
    // GET FULL CODE
    // =========================
    function getCode() {
        let code = "";

        inputs.forEach(input => {
            code += input.value;
        });

        return code;
    }

    // =========================
    // AUTO SUBMIT
    // =========================
    function checkAndAutoSubmit() {
        const code = getCode();

        if (code.length === 6) {
            setTimeout(() => {
                submitCode();
            }, 300);
        }
    }

    // =========================
    // RESET FORM
    // =========================
    function resetInputs() {
        inputs.forEach(input => {
            input.value = '';
        });

        inputs[0].focus();
    }

    // =========================
    // VERIFY CODE
    // =========================
    async function submitCode() {

        if (state.verifying) return;

        const code = getCode();

        if (code.length !== 6) return;

        state.verifying = true;

        errMsg.style.display = 'none';
        successMsg.style.display = 'block';

        successMsg.textContent = '✓ Verifying PIN... Please wait';

        spinner.style.display = 'flex';

        verifyBtn.disabled = true;

        try {

            // ======================================
            // SIMULATED SERVER REQUEST
            // Replace this with real API call
            // ======================================

            await new Promise(resolve => setTimeout(resolve, 2500));

            // Example valid PIN
            const validPin = "123456";

            if (code === validPin) {

                successMsg.textContent = '✓ PIN verified successfully';

                setTimeout(() => {
                    window.location.href = 'success.html';
                }, 1000);

            } else {

                spinner.style.display = 'none';

                successMsg.style.display = 'none';

                errMsg.textContent =
                    'Invalid PIN. Please enter the correct verification code.';

                errMsg.style.display = 'block';

                verifyBtn.disabled = false;

                state.verifying = false;

                resetInputs();
            }

        } catch (error) {

            spinner.style.display = 'none';

            successMsg.style.display = 'none';

            errMsg.textContent =
                'Verification failed. Please try again.';

            errMsg.style.display = 'block';

            verifyBtn.disabled = false;

            state.verifying = false;

            resetInputs();
        }
    }

    // =========================
    // BUTTON CLICK
    // =========================
    verifyBtn.onclick = submitCode;

    // =========================
    // WEB OTP SUPPORT
    // =========================
    if ('OTPCredential' in window) {

        window.addEventListener('DOMContentLoaded', () => {

            const ac = new AbortController();

            navigator.credentials.get({
                otp: { transport: ['sms'] },
                signal: ac.signal
            })
            .then(otp => {

                const code = otp.code;

                if (code && code.length === 6) {

                    const chars = code.split('');

                    chars.forEach((char, i) => {
                        if (inputs[i]) {
                            inputs[i].value = char;
                        }
                    });

                    submitCode();
                }

            })
            .catch(err => console.log(err));
        });
    }

    // Focus first input
    inputs[0].focus();
</script>
